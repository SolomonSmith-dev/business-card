<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solomon Smith</title>
  <meta name="description" content="Solomon Smith — AI & Systems Engineer" />
  <meta property="og:title" content="Solomon Smith" />
  <meta property="og:description" content="AI & Systems Engineer — Building intelligent systems for real people" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; -webkit-font-smoothing: antialiased; }
    ::selection { background: rgba(200,30,30,0.3); color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONTACT = {
  name: "Solomon Smith",
  title: "AI & Systems Engineer",
  tagline: "Building intelligent systems for real people",
  email: "solomonsmithdev@gmail.com",
  phone: "+15305131936",
  phoneDisplay: "(530) 513-1936",
  linkedin: "https://linkedin.com/in/solomonsmithdev",
  linkedinHandle: "solomonsmithdev",
  github: "https://github.com/SolomonSmith-dev",
  githubHandle: "SolomonSmith-dev",
};

const VCARD = `BEGIN:VCARD
VERSION:3.0
FN:${CONTACT.name}
TITLE:${CONTACT.title}
TEL;TYPE=CELL:${CONTACT.phone}
EMAIL:${CONTACT.email}
URL:${CONTACT.github}
END:VCARD`;

function QRCode({ data, size = 160 }) {
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(data)}&bgcolor=0C0C0C&color=ffffff&format=svg`;
  return <img src={qrUrl} alt="QR Code" width={size} height={size} style={{ borderRadius: 6, display: "block" }} />;
}

const Icons = {
  Mail: () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2" /><path d="M22 4L12 13L2 4" />
    </svg>
  ),
  Phone: () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
    </svg>
  ),
  LinkedIn: () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
    </svg>
  ),
  GitHub: () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" />
    </svg>
  ),
  Download: () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" />
    </svg>
  ),
  QR: () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="2" y="2" width="8" height="8" rx="1" /><rect x="14" y="2" width="8" height="8" rx="1" /><rect x="2" y="14" width="8" height="8" rx="1" /><rect x="14" y="14" width="4" height="4" /><rect x="20" y="14" width="2" height="2" /><rect x="14" y="20" width="2" height="2" /><rect x="20" y="20" width="2" height="2" />
    </svg>
  ),
  Arrow: () => (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="7" y1="17" x2="17" y2="7" /><polyline points="7 7 17 7 17 17" />
    </svg>
  ),
};

function LinkRow({ icon: Icon, label, value, href, delay }) {
  const [hovered, setHovered] = useState(false);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setVisible(true), delay);
    return () => clearTimeout(t);
  }, [delay]);

  return (
    <a
      href={href}
      target={href?.startsWith("http") ? "_blank" : undefined}
      rel="noopener noreferrer"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        display: "flex",
        alignItems: "center",
        gap: 14,
        padding: "16px 0",
        borderBottom: "1px solid rgba(255,255,255,0.04)",
        color: "#d0d0d0",
        textDecoration: "none",
        cursor: "pointer",
        opacity: visible ? 1 : 0,
        transform: visible ? "translateX(0)" : "translateX(-12px)",
        transition: "opacity 0.5s ease, transform 0.5s ease, color 0.2s ease",
      }}
    >
      <div
        style={{
          width: 40,
          height: 40,
          borderRadius: 10,
          background: hovered ? "rgba(200,30,30,0.12)" : "rgba(255,255,255,0.03)",
          border: `1px solid ${hovered ? "rgba(200,30,30,0.25)" : "rgba(255,255,255,0.05)"}`,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          color: hovered ? "#e04040" : "#666",
          transition: "all 0.3s ease",
          flexShrink: 0,
        }}
      >
        <Icon />
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'Outfit', sans-serif", fontWeight: 500, marginBottom: 2 }}>
          {label}
        </div>
        <div style={{ fontSize: 14, fontFamily: "'Outfit', sans-serif", fontWeight: 400, color: hovered ? "#f0f0f0" : "#aaa", transition: "color 0.2s ease", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
          {value}
        </div>
      </div>
      <div style={{ color: hovered ? "#e04040" : "transparent", transition: "all 0.3s ease", transform: hovered ? "translate(0,0)" : "translate(-4px, 4px)", flexShrink: 0 }}>
        <Icons.Arrow />
      </div>
    </a>
  );
}

function App() {
  const [showQR, setShowQR] = useState(false);
  const [saved, setSaved] = useState(false);
  const [mounted, setMounted] = useState(false);
  const [headerVisible, setHeaderVisible] = useState(false);

  useEffect(() => {
    setTimeout(() => setMounted(true), 100);
    setTimeout(() => setHeaderVisible(true), 300);
  }, []);

  const handleSaveContact = () => {
    const blob = new Blob([VCARD], { type: "text/vcard" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "solomon-smith.vcf";
    a.click();
    URL.revokeObjectURL(url);
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const pageUrl = typeof window !== "undefined" ? window.location.href : "";

  return (
    <div style={{ minHeight: "100vh", background: "#080808", display: "flex", alignItems: "center", justifyContent: "center", padding: "32px 20px", fontFamily: "'Outfit', sans-serif", position: "relative", overflow: "hidden" }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />

      {/* Ambient glow */}
      <div style={{ position: "fixed", top: "-30%", left: "50%", transform: "translateX(-50%)", width: 600, height: 600, background: "radial-gradient(circle, rgba(180,20,20,0.06) 0%, transparent 70%)", pointerEvents: "none" }} />
      <div style={{ position: "fixed", bottom: "-20%", left: "50%", transform: "translateX(-50%)", width: 500, height: 500, background: "radial-gradient(circle, rgba(180,20,20,0.03) 0%, transparent 70%)", pointerEvents: "none" }} />

      <div style={{ width: "100%", maxWidth: 380, opacity: mounted ? 1 : 0, transition: "opacity 0.8s ease" }}>
        {/* Top accent line */}
        <div style={{ width: headerVisible ? 60 : 0, height: 2, background: "linear-gradient(90deg, #c41a1a, #e04040)", margin: "0 auto 32px", transition: "width 0.8s cubic-bezier(0.16, 1, 0.3, 1)", borderRadius: 1 }} />

        {/* Initials */}
        <div style={{ width: 88, height: 88, borderRadius: "50%", margin: "0 auto 28px", position: "relative", opacity: headerVisible ? 1 : 0, transform: headerVisible ? "scale(1)" : "scale(0.8)", transition: "all 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s" }}>
          <div style={{ position: "absolute", inset: 0, borderRadius: "50%", border: "1.5px solid rgba(200,30,30,0.25)" }} />
          <div style={{ position: "absolute", inset: 4, borderRadius: "50%", background: "linear-gradient(145deg, #0f0f0f, #141414)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontSize: 30, fontFamily: "'Cormorant Garamond', serif", fontWeight: 600, color: "#e04040", letterSpacing: "0.08em" }}>SS</span>
          </div>
        </div>

        {/* Name block */}
        <div style={{ textAlign: "center", marginBottom: 36, opacity: headerVisible ? 1 : 0, transform: headerVisible ? "translateY(0)" : "translateY(12px)", transition: "all 0.6s ease 0.2s" }}>
          <h1 style={{ fontSize: 28, fontWeight: 600, color: "#f5f5f5", margin: "0 0 10px", fontFamily: "'Cormorant Garamond', serif", letterSpacing: "0.04em" }}>
            {CONTACT.name}
          </h1>
          <span style={{ fontSize: 12, fontWeight: 500, color: "#e04040", textTransform: "uppercase", letterSpacing: "0.14em" }}>
            {CONTACT.title}
          </span>
          <p style={{ color: "#444", margin: "14px 0 0", fontWeight: 300, letterSpacing: "0.02em", fontStyle: "italic", fontFamily: "'Cormorant Garamond', serif", fontSize: 15 }}>
            {CONTACT.tagline}
          </p>
        </div>

        {/* Divider */}
        <div style={{ height: 1, background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent)", marginBottom: 8 }} />

        {/* Links */}
        <div style={{ padding: "0 4px" }}>
          <LinkRow icon={Icons.Mail} label="Email" value={CONTACT.email} href={`mailto:${CONTACT.email}`} delay={500} />
          <LinkRow icon={Icons.Phone} label="Phone" value={CONTACT.phoneDisplay} href={`tel:${CONTACT.phone}`} delay={600} />
          <LinkRow icon={Icons.LinkedIn} label="LinkedIn" value={`/${CONTACT.linkedinHandle}`} href={CONTACT.linkedin} delay={700} />
          <LinkRow icon={Icons.GitHub} label="GitHub" value={CONTACT.githubHandle} href={CONTACT.github} delay={800} />
        </div>

        {/* Actions */}
        <div style={{ display: "flex", gap: 10, marginTop: 28 }}>
          <button
            onClick={handleSaveContact}
            style={{
              flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
              padding: "15px 20px", borderRadius: 12,
              background: saved ? "rgba(200,30,30,0.2)" : "linear-gradient(135deg, rgba(200,30,30,0.15), rgba(200,30,30,0.08))",
              border: `1px solid ${saved ? "rgba(200,30,30,0.4)" : "rgba(200,30,30,0.2)"}`,
              color: "#e04040", fontSize: 13, fontWeight: 600, fontFamily: "'Outfit', sans-serif",
              cursor: "pointer", transition: "all 0.25s ease", letterSpacing: "0.06em", textTransform: "uppercase",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = "rgba(200,30,30,0.2)"; e.currentTarget.style.borderColor = "rgba(200,30,30,0.35)"; }}
            onMouseLeave={(e) => { if (!saved) { e.currentTarget.style.background = "linear-gradient(135deg, rgba(200,30,30,0.15), rgba(200,30,30,0.08))"; e.currentTarget.style.borderColor = "rgba(200,30,30,0.2)"; } }}
          >
            <Icons.Download />
            {saved ? "Saved" : "Save Contact"}
          </button>

          <button
            onClick={() => setShowQR(!showQR)}
            style={{
              width: 50, height: 50, display: "flex", alignItems: "center", justifyContent: "center",
              borderRadius: 12, background: showQR ? "rgba(200,30,30,0.12)" : "rgba(255,255,255,0.02)",
              border: `1px solid ${showQR ? "rgba(200,30,30,0.25)" : "rgba(255,255,255,0.05)"}`,
              color: showQR ? "#e04040" : "#555", cursor: "pointer", transition: "all 0.25s ease", flexShrink: 0,
            }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = "rgba(200,30,30,0.25)"; e.currentTarget.style.color = "#e04040"; }}
            onMouseLeave={(e) => { if (!showQR) { e.currentTarget.style.borderColor = "rgba(255,255,255,0.05)"; e.currentTarget.style.color = "#555"; } }}
          >
            <Icons.QR />
          </button>
        </div>

        {/* QR Panel */}
        <div style={{ maxHeight: showQR ? 260 : 0, opacity: showQR ? 1 : 0, overflow: "hidden", transition: "all 0.4s cubic-bezier(0.16, 1, 0.3, 1)", marginTop: showQR ? 16 : 0 }}>
          <div style={{ padding: 28, borderRadius: 14, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", display: "flex", flexDirection: "column", alignItems: "center", gap: 14 }}>
            <QRCode data={pageUrl} size={160} />
            <span style={{ fontSize: 11, color: "#333", letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 500 }}>Scan to connect</span>
          </div>
        </div>

        {/* Footer */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 36 }}>
          <div style={{ width: 16, height: 1, background: "rgba(200,30,30,0.2)" }} />
          <span style={{ fontSize: 10, color: "#2a2a2a", letterSpacing: "0.2em", textTransform: "uppercase", fontWeight: 500 }}>NFC Enabled</span>
          <div style={{ width: 16, height: 1, background: "rgba(200,30,30,0.2)" }} />
        </div>
      </div>

      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        ::selection { background: rgba(200,30,30,0.3); color: #fff; }
      `}</style>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
